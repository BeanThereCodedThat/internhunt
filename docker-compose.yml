version: "3.9"

# ── How to use ─────────────────────────────────────────────────────────────
# Set DB_PASSWORD in your shell before running docker compose:
#
#   export DB_PASSWORD=your_password        # Linux / macOS
#   set DB_PASSWORD=your_password           # Windows CMD
#   $env:DB_PASSWORD="your_password"        # Windows PowerShell
#
# Then:
#   docker compose up --build
#
# Or create a .env file in this directory (never commit it):
#   DB_PASSWORD=your_password
# ───────────────────────────────────────────────────────────────────────────

services:

  db:
    image: mysql:8.0
    container_name: internhunt-db
    restart: always
    environment:
      # FIX: password is no longer hardcoded; read from host environment / .env file
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: internhunt
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # FIX: schema.sql now contains actual CREATE TABLE statements (see src/main/resources/schema.sql)
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: internhunt-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/internhunt?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./internhunt-frontend
    container_name: internhunt-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data: