spring.application.name=internhunt
spring.task.scheduling.pool.size=2

#
#
#   Linux / macOS:
#     export DB_URL=jdbc:mysql://localhost:3306/internhunt
#     export DB_USER=root
#     export DB_PASSWORD=your_password
#
#   Windows (CMD):
#     set DB_URL=jdbc:mysql://localhost:3306/internhunt
#     set DB_USER=root
#     set DB_PASSWORD=your_password
#
#   Windows (PowerShell):
#     $env:DB_URL="jdbc:mysql://localhost:3306/internhunt"
#     $env:DB_USER="root"
#     $env:DB_PASSWORD="your_password"
#
#   Docker Compose: see docker-compose.yml ? pass them in the environment block.
#
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/internhunt}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ??????????????????????????????????????????????????????????
# validate = Hibernate checks the schema but never alters it.
# Use create-drop while developing locally if you want auto-creation.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ?? HackerNews scraper ???????????????????????????????????????????????????????
# FIX: the HN thread ID was hardcoded in the class (stale every month).
#      Override this property each month with the new "Who is Hiring?" thread ID.
scraper.hackernews.thread-id=47975571